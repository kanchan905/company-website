<main class="company-page">
  <section class="hero">
    <app-section-heading
      eyebrow="Our Team"
      title="Experts who understand both software and business operations"
      description="We combine consulting, implementation, training, and support to ensure teams achieve real outcomes."
    />

    <div class="hero-stats">
      @for (item of metrics; track item.label) {
        <article>
          <h3>{{ item.value }}</h3>
          <p>{{ item.label }}</p>
        </article>
      }
    </div>
  </section>

  <section class="team-grid">
    @for (member of members; track member.name) {
      <article class="team-card">
        <div class="avatar">{{ member.name[0] }}</div>
        <h3>{{ member.name }}</h3>
        <p class="role">{{ member.role }}</p>
        <p class="summary">{{ member.summary }}</p>
      </article>
    }
  </section>

  <app-media-highlight
    imageSrc="images/logo.jpeg"
    imageAlt="Team campaign sample visual"
    eyebrow="Team Culture"
    title="Showcase your team photo or office environment here"
    description="Is block me aap team group photo, workspace image, ya event image add kar sakte ho."
    pointOne="Human touch add hota hai"
    pointTwo="Brand authenticity improve hoti hai"
    pointThree="Trust conversion better hota hai"
    ctaText="Update Team Visual"
    ctaLink="/company/careers"
    [reverse]="true"
  />

  <section class="culture">
    <h2>How we work</h2>
    <div class="culture-points">
      @for (item of strengths; track item) {
        <article>{{ item }}</article>
      }
    </div>
    <a routerLink="/company/careers">Join Our Team</a>
  </section>
</main>
